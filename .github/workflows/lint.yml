# what is the goal of your workflow 
# Goal: Whenever someone changes the python code , the linter will check if the syntax, format, indendation (Linting)
# is correct or not.

name: Auto Linter

on: 
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
# this step will automatically clone the code of the current branch in to the runner 
    steps:
      - name: Checkout/Clone the code 
        uses: actions/checkout@v7
      # this step will install the linting tool
      - name: Install Linter
        run: pip install ruff
      # this step will run the linter 
      - name: Check the files for linting
        run: ruff check .
      
